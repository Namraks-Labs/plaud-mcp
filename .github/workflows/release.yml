name: Release

# Publishes the package to npm when a GitHub Release is published.
# Requires a repo secret NPM_TOKEN: an npm granular access token with
# read/write to @namraks-labs/plaud-mcp (or the @namraks-labs scope) and
# "bypass 2FA" enabled (automation token).
on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # enables npm publish provenance via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      # --provenance attaches a signed build-provenance attestation (OIDC).
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
