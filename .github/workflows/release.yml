name: Release

# Publishes to npm when a GitHub Release is published, using npm Trusted
# Publishing (OIDC) — no tokens/secrets. Requires a one-time setup on npm:
# configure a Trusted Publisher for @namraks-labs/plaud-mcp pointing at this
# repo (Namraks-Labs/plaud-mcp) and workflow file (release.yml).
on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted Publishing / OIDC requires npm >= 11.5.1.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      # No NODE_AUTH_TOKEN: auth + provenance come from the OIDC identity.
      - run: npm publish --access public
